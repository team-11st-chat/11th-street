spring:
  application:
    name: realtime-chat
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/realtime_chat}
    username: ${MYSQL_USER:realtime_chat}
    password: ${MYSQL_PASSWORD:realtime_chat}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  shutdown: graceful
