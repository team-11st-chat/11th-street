spring:
  application:
    name: 11th-street
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/realtime_chat}
    username: ${MYSQL_USER:realtime_chat}
    password: ${MYSQL_PASSWORD:realtime_chat}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET:dev-local-secret-change-me-please-32bytes-minimum-0123456789}
  access-token-validity-seconds: 3600
  refresh-token-validity-seconds: 1209600
  refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
