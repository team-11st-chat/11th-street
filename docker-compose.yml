name: 11th-street-local

services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-realtime_chat}
      MYSQL_USER: ${MYSQL_USER:-realtime_chat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-realtime_chat}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-realtime_chat_root}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  default:
    name: 11th-street-local-network

volumes:
  mysql-data:
  redis-data:
